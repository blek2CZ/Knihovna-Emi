<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Generátor ikon – Knihovna Emi</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    h2 { color: #3498db; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    a { display: inline-block; margin: 8px 10px; padding: 8px 16px;
        background: #3498db; color: #fff; text-decoration: none; border-radius: 6px; }
    a:hover { background: #2980b9; }
    .preview { margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Generátor ikon – Knihovna Emi 📚</h2>
  <p>Kliknutím na tlačítka stáhněte ikony a vložte je do složky <code>assets/</code> v projektu.</p>

  <div class="preview">
    <canvas id="canvas192" width="192" height="192"></canvas>
    <canvas id="canvas512" width="512" height="512"></canvas>
  </div>

  <div id="links"></div>

  <script>
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawBookIcon(ctx, size) {
      const s = size;

      // ── Pozadí (tmavě modrá, zaoblená) ───────────────────────────
      roundRect(ctx, 0, 0, s, s, s * 0.18);
      ctx.fillStyle = '#1a2a4a';
      ctx.fill();

      // ── Horní kniha (zelená, nakloněná) ──────────────────────────
      ctx.save();
      ctx.translate(s * 0.5, s * 0.38);
      ctx.rotate(-0.18);
      roundRect(ctx, -s * 0.28, -s * 0.19, s * 0.56, s * 0.38, s * 0.04);
      ctx.fillStyle = '#27ae60';
      ctx.fill();
      // hřbet
      ctx.fillStyle = '#1e8449';
      ctx.fillRect(-s * 0.28, -s * 0.19, s * 0.09, s * 0.38);
      // stránky (světlý okraj vpravo)
      ctx.fillStyle = '#f0f0e8';
      ctx.fillRect(s * 0.21, -s * 0.17, s * 0.05, s * 0.34);
      // řádky textu
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      for (let i = 0; i < 4; i++) {
        const w = i === 3 ? s * 0.22 : s * 0.32;
        ctx.fillRect(-s * 0.14, -s * 0.10 + i * s * 0.065, w, s * 0.028);
      }
      ctx.restore();

      // ── Střední kniha (červená, mírně nakloněná) ──────────────────
      ctx.save();
      ctx.translate(s * 0.5, s * 0.55);
      ctx.rotate(0.08);
      roundRect(ctx, -s * 0.30, -s * 0.19, s * 0.60, s * 0.38, s * 0.04);
      ctx.fillStyle = '#c0392b';
      ctx.fill();
      ctx.fillStyle = '#962d22';
      ctx.fillRect(-s * 0.30, -s * 0.19, s * 0.09, s * 0.38);
      ctx.fillStyle = '#f0f0e8';
      ctx.fillRect(s * 0.23, -s * 0.17, s * 0.05, s * 0.34);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      for (let i = 0; i < 4; i++) {
        const w = i === 3 ? s * 0.24 : s * 0.34;
        ctx.fillRect(-s * 0.16, -s * 0.10 + i * s * 0.065, w, s * 0.028);
      }
      ctx.restore();

      // ── Spodní kniha (modrá, rovná) – hlavní ─────────────────────
      ctx.save();
      ctx.translate(s * 0.5, s * 0.72);
      roundRect(ctx, -s * 0.32, -s * 0.17, s * 0.64, s * 0.34, s * 0.04);
      ctx.fillStyle = '#2980b9';
      ctx.fill();
      ctx.fillStyle = '#1f618d';
      ctx.fillRect(-s * 0.32, -s * 0.17, s * 0.09, s * 0.34);
      ctx.fillStyle = '#f0f0e8';
      ctx.fillRect(s * 0.25, -s * 0.15, s * 0.05, s * 0.30);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      for (let i = 0; i < 3; i++) {
        const w = i === 2 ? s * 0.26 : s * 0.36;
        ctx.fillRect(-s * 0.18, -s * 0.08 + i * s * 0.065, w, s * 0.028);
      }
      ctx.restore();

      // ── Záložka (žlutá stuha) na horní knize ─────────────────────
      ctx.save();
      ctx.translate(s * 0.5, s * 0.38);
      ctx.rotate(-0.18);
      ctx.fillStyle = '#f1c40f';
      ctx.beginPath();
      ctx.moveTo(s * 0.18, -s * 0.19);
      ctx.lineTo(s * 0.26, -s * 0.19);
      ctx.lineTo(s * 0.26, s * 0.04);
      ctx.lineTo(s * 0.22, s * 0.00);
      ctx.lineTo(s * 0.18, s * 0.04);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function createIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      drawBookIcon(ctx, size);

      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.textContent = `⬇ Stáhnout icon-${size}.png`;
      document.getElementById('links').appendChild(a);
    }

    createIcon('canvas192', 192);
    createIcon('canvas512', 512);
  </script>
</body>
</html>
